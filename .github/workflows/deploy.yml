# ─────────────────────────────────────────────────────────────────────────────
# LoopBridge — Production CI/CD
#
# Auth:     OIDC (no static AWS keys stored anywhere)
# Deploy:   SSM Run Command → EC2 instance found by tag, not hardcoded ID
# Repo:     ${{ github.repository }} — no hardcoded repo names
#
# ONE GitHub variable required:
#   AWS_ROLE_ARN  — from `terraform output github_actions_role_arn`
#   (Repo → Settings → Secrets and variables → Actions → Variables)
#
# All other AWS values (account ID, instance ID, ECR registry, S3 bucket)
# are discovered dynamically — nothing hardcoded in this file.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy (production)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:      us-east-1
  ECR_REPO:        loopbridge-api
  CONTAINER_NAME:  loopbridge

permissions:
  contents: read
  id-token: write    # required for OIDC

jobs:
  # ─── Build & Test ───────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - run: cd client && npm ci --legacy-peer-deps
      - run: cd server && npm ci
      - run: cd client && npm run lint --if-present
      - run: cd server && npm run lint --if-present
      - run: cd server && npm test --if-present
      - run: cd client && npm run build

  # ─── Push image to ECR ──────────────────────────────────────────────────────
  push-image:
    name: Push Image to ECR
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.aws.outputs.ecr_registry }}
      image_tag:    ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Assume deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Derive account-specific values
        id: aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "ecr_registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "account_id=${ACCOUNT_ID}"     >> $GITHUB_ENV
          echo "ECR_REGISTRY=${ECR_REGISTRY}" >> $GITHUB_ENV

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}"
          docker build \
            --platform linux/amd64 \
            --file server/Dockerfile \
            --tag "${IMAGE}:${{ github.sha }}" \
            --tag "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"
          echo "Pushed ${IMAGE}:${{ github.sha }}"

  # ─── Deploy via SSM ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: push-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assume deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Discover deployment targets
        id: targets
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          S3_BUCKET="loopbridge-uploads-${ACCOUNT_ID}"

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=LoopBridge" \
              "Name=tag:Name,Values=loopbridge-app" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          MC_ROLE=$(aws iam get-role \
            --role-name loopbridge-mediaconvert-role \
            --query "Role.Arn" --output text 2>/dev/null || echo "")

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No running loopbridge-app instance found. Did terraform apply run?"
            exit 1
          fi

          echo "instance_id=${INSTANCE_ID}"   >> $GITHUB_OUTPUT
          echo "ecr_registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "s3_bucket=${S3_BUCKET}"       >> $GITHUB_OUTPUT
          echo "mc_role=${MC_ROLE}"           >> $GITHUB_OUTPUT

      - name: Build SSM payload and send
        id: ssm
        env:
          INSTANCE:              ${{ steps.targets.outputs.instance_id }}
          ECR_REGISTRY:          ${{ steps.targets.outputs.ecr_registry }}
          S3_BUCKET:             ${{ steps.targets.outputs.s3_bucket }}
          MC_ROLE:               ${{ steps.targets.outputs.mc_role }}
          SHA:                   ${{ github.sha }}
          REGION:                ${{ env.AWS_REGION }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          SMTP_HOST:             ${{ secrets.SMTP_HOST }}
          SMTP_PORT:             ${{ secrets.SMTP_PORT }}
          SMTP_USER:             ${{ secrets.SMTP_USER }}
          SMTP_PASS:             ${{ secrets.SMTP_PASS }}
          NEWSLETTER_FROM_EMAIL: ${{ secrets.NEWSLETTER_FROM_EMAIL }}
          TWILIO_ACCOUNT_SID:    ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:     ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM:  ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_SMS_FROM:       ${{ secrets.TWILIO_SMS_FROM }}
          JWT_SECRET:            ${{ secrets.JWT_SECRET }}
        run: |
          python3 .github/scripts/build-ssm-prod-payload.py > /tmp/ssm.json
          COMMAND_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm.json \
            --query 'Command.CommandId' --output text)
          echo "command_id=${COMMAND_ID}" >> $GITHUB_OUTPUT
          echo "SSM command sent: ${COMMAND_ID}"

      - name: Wait for deploy
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
          INSTANCE="${{ steps.targets.outputs.instance_id }}"
          STATUS="Pending"
          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE" \
              --query 'StatusDetails' --output text 2>/dev/null || echo "Pending")
            echo "  [$i/36] $STATUS"
            if [ "$STATUS" = "Success" ]; then
              break
            fi
            if [[ "$STATUS" =~ ^(Failed|TimedOut|Cancelled) ]]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" --instance-id "$INSTANCE" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done
          if [ "$STATUS" != "Success" ]; then
            echo "Deploy timed out (last status: $STATUS)"
            exit 1
          fi

      - name: Show deploy logs
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.targets.outputs.instance_id }}" \
            --query 'StandardOutputContent' --output text || true

      - name: Health check
        run: |
          sleep 30
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              "https://loopbridge.network/api/health" || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Health check passed." && exit 0
            sleep 15
          done
          echo "Health check failed." && exit 1
