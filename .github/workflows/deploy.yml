# LoopBridge — CI/CD Pipeline
# Flow: push to main → build & test → push image to ECR → SSM deploy to EC2
#
# No SSH required. Deployment goes through AWS SSM (port 443 only).
# EC2 instance must have AmazonSSMManagedInstanceCore in its IAM role.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID     — loopbridge-admin IAM user key
#   AWS_SECRET_ACCESS_KEY — loopbridge-admin IAM user secret

name: Deploy LoopBridge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:       us-east-1
  ECR_REPOSITORY:   loopbridge-api
  ECR_REGISTRY:     680128294518.dkr.ecr.us-east-1.amazonaws.com
  EC2_INSTANCE_ID:  i-035f5e2909653efa0
  S3_BUCKET:        loopbridge-uploads-680128294518

permissions:
  contents: read

jobs:
  # ─── Job 1: Build & Test ─────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci --legacy-peer-deps

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Lint (if configured)
        run: |
          cd client && npm run lint --if-present
          cd ../server && npm run lint --if-present

      - name: Server tests (if configured)
        run: cd server && npm test --if-present

      - name: Verify client builds cleanly
        run: cd client && npm run build

  # ─── Job 2: Push Docker image to ECR ─────────────────────────────────────
  push-image:
    name: Push Image to ECR
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          SHA=${{ github.sha }}

          docker build \
            --platform linux/amd64 \
            --file server/Dockerfile \
            --tag $IMAGE:$SHA \
            --tag $IMAGE:latest \
            .

          docker push $IMAGE:$SHA
          docker push $IMAGE:latest

          echo "Pushed $IMAGE:$SHA"

  # ─── Job 3: Deploy via SSM (no SSH, no open port 22) ─────────────────────
  deploy:
    name: Deploy to EC2 via SSM
    needs: push-image
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Send deploy command via SSM
        id: ssm
        run: |
          python3 - > /tmp/ssm-prod.json << 'INNERPY'
import json, os
image   = os.environ['IMAGE']
sha     = os.environ['SHA']
instance= os.environ['INSTANCE']
bucket  = os.environ['BUCKET']
region  = os.environ['REGION']
registry= '680128294518.dkr.ecr.us-east-1.amazonaws.com'
mc_role = 'arn:aws:iam::680128294518:role/loopbridge-mediaconvert-role'
google  = os.environ.get('GOOGLE_CLIENT_ID','')
s_host  = os.environ.get('SMTP_HOST','')
s_port  = os.environ.get('SMTP_PORT','587')
s_user  = os.environ.get('SMTP_USER','')
s_pass  = os.environ.get('SMTP_PASS','')
nl_from = os.environ.get('NEWSLETTER_FROM_EMAIL','')
tw_sid  = os.environ.get('TWILIO_ACCOUNT_SID','')
tw_tok  = os.environ.get('TWILIO_AUTH_TOKEN','')
tw_wa   = os.environ.get('TWILIO_WHATSAPP_FROM','')
tw_sms  = os.environ.get('TWILIO_SMS_FROM','')
ls_key  = os.environ.get('LITESTREAM_KEY','')
ls_sec  = os.environ.get('LITESTREAM_SECRET','')
jwt     = os.environ.get('JWT_SECRET','')

docker_run = (
  f'sudo docker run -d --name loopbridge --restart unless-stopped'
  f' -p 80:3000 -v /data:/data'
  f' -e NODE_ENV=production -e DB_TYPE=sqlite -e DB_PATH=/data/loopbridge.db'
  f' -e STORAGE_DRIVER=s3 -e S3_BUCKET={bucket} -e S3_REGION={region} -e S3_PREFIX=uploads/'
  f' -e MEDIACONVERT_ENDPOINT=https://mediaconvert.{region}.amazonaws.com'
  f' -e MEDIACONVERT_ROLE_ARN={mc_role}'
  f' -e COOKIE_SECURE=false -e CORS_ORIGIN=true'
  f' -e LITESTREAM_S3_PATH=s3://{bucket}/litestream/loopbridge.db'
  f' -e LITESTREAM_ACCESS_KEY_ID={ls_key}'
  f' -e LITESTREAM_SECRET_ACCESS_KEY={ls_sec}'
  f' -e GOOGLE_CLIENT_ID={google}'
  f' -e SMTP_HOST={s_host} -e SMTP_PORT={s_port}'
  f' -e SMTP_USER={s_user} -e SMTP_PASS={s_pass}'
  f' -e NEWSLETTER_FROM_EMAIL={nl_from}'
  f' -e TWILIO_ACCOUNT_SID={tw_sid} -e TWILIO_AUTH_TOKEN={tw_tok}'
  f' -e TWILIO_WHATSAPP_FROM={tw_wa} -e TWILIO_SMS_FROM={tw_sms}'
  f' -e JWT_SECRET={jwt}'
  f' {image}:{sha}'
)

cmds = [
  'set -euo pipefail',
  'echo "--- Authenticating with ECR ---"',
  f'aws ecr get-login-password --region {region} | sudo docker login --username AWS --password-stdin {registry}',
  f'echo "--- Pulling {image}:{sha} ---"',
  f'sudo docker pull {image}:{sha}',
  'echo "--- Stopping old container ---"',
  'sudo docker rm -f loopbridge 2>/dev/null || true',
  'echo "--- Starting new container ---"',
  docker_run,
  'echo "--- Container status ---"',
  'sleep 5 && sudo docker ps --filter name=loopbridge --format "table {{{{.Names}}}}\\t{{{{.Status}}}}\\t{{{{.Ports}}}}"',
  'echo "--- Last 10 log lines ---"',
  'sudo docker logs loopbridge --tail 10',
  'echo "--- Pruning old images ---"',
  'sudo docker image prune -f',
]

print(json.dumps({
  'InstanceIds': [instance],
  'DocumentName': 'AWS-RunShellScript',
  'Comment': f'Deploy {sha}',
  'TimeoutSeconds': 300,
  'Parameters': {'commands': cmds},
}, indent=2))
INNERPY

          echo "--- SSM payload preview ---"
          cat /tmp/ssm-prod.json

          COMMAND_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm-prod.json \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM command sent: $COMMAND_ID"
        env:
          IMAGE:                 ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          SHA:                   ${{ github.sha }}
          INSTANCE:              ${{ env.EC2_INSTANCE_ID }}
          BUCKET:                ${{ env.S3_BUCKET }}
          REGION:                ${{ env.AWS_REGION }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          SMTP_HOST:             ${{ secrets.SMTP_HOST }}
          SMTP_PORT:             ${{ secrets.SMTP_PORT }}
          SMTP_USER:             ${{ secrets.SMTP_USER }}
          SMTP_PASS:             ${{ secrets.SMTP_PASS }}
          NEWSLETTER_FROM_EMAIL: ${{ secrets.NEWSLETTER_FROM_EMAIL }}
          TWILIO_ACCOUNT_SID:    ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:     ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM:  ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_SMS_FROM:       ${{ secrets.TWILIO_SMS_FROM }}
          LITESTREAM_KEY:        ${{ secrets.AWS_ACCESS_KEY_ID }}
          LITESTREAM_SECRET:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          JWT_SECRET:            ${{ secrets.JWT_SECRET }}

      - name: Wait for SSM command to complete
        run: |
          COMMAND_ID=${{ steps.ssm.outputs.command_id }}
          INSTANCE=${{ env.EC2_INSTANCE_ID }}

          echo "Waiting for command $COMMAND_ID ..."

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE" \
              --query 'StatusDetails' \
              --output text 2>/dev/null || echo "Pending")

            echo "  [$i/30] $STATUS"

            if [[ "$STATUS" == "Success" ]]; then
              echo "Deploy succeeded."
              break
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "TimedOut" || "$STATUS" == "Cancelled" ]]; then
              echo "Deploy command failed: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE" \
                --query 'StandardErrorContent' \
                --output text || true
              exit 1
            fi

            sleep 10
          done

          if [[ "$STATUS" != "Success" ]]; then
            echo "Timed out waiting for deploy."
            exit 1
          fi

      - name: Show deploy output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query 'StandardOutputContent' \
            --output text || true

      - name: Health check
        run: |
          echo "Waiting 10s for container to settle..."
          sleep 10

          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)

          echo "Checking http://$EC2_IP/api/articles ..."

          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://$EC2_IP/api/articles" || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 5
          done

          echo "Health check failed after 3 attempts!"
          exit 1
