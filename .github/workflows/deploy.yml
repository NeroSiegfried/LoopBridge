# LoopBridge — CI/CD Pipeline
# On push to main: build Docker image → push to ECR → SSH deploy to EC2

name: Deploy LoopBridge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: loopbridge-api
  EC2_HOST: 44.197.184.251
  EC2_USER: ec2-user
  S3_BUCKET: loopbridge-uploads-680128294518

permissions:
  contents: read

jobs:
  # ─── Job 1: Build & Test ─────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: |
          cd client && npm ci --legacy-peer-deps
          cd ../server && npm ci

      - name: Lint & test (if scripts exist)
        run: |
          cd client && npm run lint --if-present
          cd ../server && npm run lint --if-present && npm test --if-present

      - name: Verify client builds
        run: cd client && npm run build

  # ─── Job 2: Deploy to EC2 ────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -f server/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

      - name: Deploy to EC2 via SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "$EC2_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << REMOTE
            set -e

            # Authenticate with ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              sudo docker login --username AWS --password-stdin \
              ${ECR_REGISTRY}

            # Pull new image
            sudo docker pull ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}

            # Stop and remove old container
            sudo docker stop loopbridge 2>/dev/null || true
            sudo docker rm loopbridge 2>/dev/null || true

            # Start new container
            sudo docker run -d \
              --name loopbridge \
              --restart unless-stopped \
              -p 80:3000 \
              -v /data:/data \
              -e NODE_ENV=production \
              -e DB_TYPE=sqlite \
              -e DB_PATH=/data/loopbridge.db \
              -e STORAGE_DRIVER=s3 \
              -e S3_BUCKET=${{ env.S3_BUCKET }} \
              -e S3_REGION=${{ env.AWS_REGION }} \
              -e S3_PREFIX=uploads/ \
              -e COOKIE_SECURE=false \
              -e CORS_ORIGIN=true \
              ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}

            # Verify it started
            sleep 5
            sudo docker logs loopbridge --tail 5
            sudo docker inspect loopbridge --format '{{.State.Status}}'

            # Clean up old images (keep last 3)
            sudo docker image prune -f
          REMOTE

          rm -f /tmp/deploy_key

      - name: Health check
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.EC2_HOST }}/api/articles)
          echo "Health check status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "Health check failed!" && exit 1)
