# ─────────────────────────────────────────────────────────────────────────────
# LoopBridge — Sandbox CI/CD (non-main branches)
# Mirrors production but runs on port 3001 with a separate DB and :sandbox tag.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy (sandbox)

on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

env:
  AWS_REGION:     us-east-1
  ECR_REPO:       loopbridge-api
  SANDBOX_PORT:   3001
  CONTAINER_NAME: loopbridge-sandbox
  DB_PATH:        /data/loopbridge-sandbox.db

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    name: Build & Test (sandbox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json
      - run: cd client && npm ci --legacy-peer-deps
      - run: cd server && npm ci
      - run: cd client && npm run lint --if-present
      - run: cd server && npm run lint --if-present
      - run: cd server && npm test --if-present
      - run: cd client && npm run build

  push-image:
    name: Push Sandbox Image
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.aws.outputs.ecr_registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Assume deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Derive ECR registry
        id: aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "ecr_registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "ECR_REGISTRY=${ECR_REGISTRY}" >> $GITHUB_ENV

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push (sandbox tag — never overwrites :latest)
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}"
          BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          docker build --platform linux/amd64 \
            --file server/Dockerfile \
            --tag "${IMAGE}:sandbox-${{ github.sha }}" \
            --tag "${IMAGE}:sandbox-${BRANCH}" \
            .
          docker push "${IMAGE}:sandbox-${{ github.sha }}"
          docker push "${IMAGE}:sandbox-${BRANCH}"

  deploy:
    name: Deploy Sandbox to EC2
    needs: push-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assume deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Discover targets
        id: targets
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          S3_BUCKET="loopbridge-uploads-${ACCOUNT_ID}"
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=LoopBridge" \
              "Name=tag:Name,Values=loopbridge-app" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "ecr_registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "s3_bucket=${S3_BUCKET}"       >> $GITHUB_OUTPUT
          echo "instance_id=${INSTANCE_ID}"   >> $GITHUB_OUTPUT

      - name: Send SSM command
        id: ssm
        env:
          IMAGE:     ${{ steps.targets.outputs.ecr_registry }}/${{ env.ECR_REPO }}
          SHA:       ${{ github.sha }}
          INSTANCE:  ${{ steps.targets.outputs.instance_id }}
          CONTAINER: ${{ env.CONTAINER_NAME }}
          PORT:      ${{ env.SANDBOX_PORT }}
          DBPATH:    ${{ env.DB_PATH }}
          BUCKET:    ${{ steps.targets.outputs.s3_bucket }}
          REGION:    ${{ env.AWS_REGION }}
        run: |
          python3 .github/scripts/build-ssm-sandbox-payload.py > /tmp/ssm-sandbox.json
          COMMAND_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm-sandbox.json \
            --query 'Command.CommandId' --output text)
          echo "command_id=${COMMAND_ID}" >> $GITHUB_OUTPUT

      - name: Wait for deploy
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
          INSTANCE="${{ steps.targets.outputs.instance_id }}"
          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE" \
              --query 'StatusDetails' --output text 2>/dev/null || echo "Pending")
            echo "  [$i/36] $STATUS"
            [ "$STATUS" = "Success" ] && break
            [[ "$STATUS" =~ ^(Failed|TimedOut|Cancelled) ]] && exit 1
            sleep 10
          done

      - name: Show logs
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.targets.outputs.instance_id }}" \
            --query 'StandardOutputContent' --output text || true

      - name: Health check
        run: |
          sleep 10
          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids "${{ steps.targets.outputs.instance_id }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          SG_ID=$(aws ec2 describe-instances \
            --instance-ids "${{ steps.targets.outputs.instance_id }}" \
            --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' \
            --output text)
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" --protocol tcp --port ${{ env.SANDBOX_PORT }} \
            --cidr 0.0.0.0/0 2>/dev/null || true
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              "http://${EC2_IP}:${{ env.SANDBOX_PORT }}/api/articles" || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && \
              echo "Sandbox live: http://${EC2_IP}:${{ env.SANDBOX_PORT }}" && exit 0
            sleep 10
          done
          exit 1
