<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beginner Track — LoopBridge Academy</title>
    <meta name="description" content="Start your crypto journey with beginner-friendly courses on blockchain fundamentals, wallets, and DeFi basics.">
    <meta property="og:title" content="Beginner Track — LoopBridge Academy">
    <meta property="og:description" content="Start your crypto journey with beginner-friendly courses on blockchain fundamentals, wallets, and DeFi basics.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/images/logos/loopbridge-og.png">
    <meta property="og:site_name" content="LoopBridge">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Beginner Track — LoopBridge Academy">
    <meta name="twitter:description" content="Start your crypto journey with beginner-friendly courses on blockchain fundamentals, wallets, and DeFi basics.">
    <meta name="twitter:image" content="/images/logos/loopbridge-og.png">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/academy.css">
    <link rel="stylesheet" href="./styles/learning_track.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=auto_stories" />
    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet"/>
    <script src="https://kit.fontawesome.com/20310b9de2.js" crossorigin="anonymous"></script>
</head>
<body>
    <div data-component="navbar" data-props='{"basePath":"./","activePage":"academy"}'></div>


    <header class="track-hero">
        <div class="section-container">
            <div class="track-inner-section">
                <div class="hero-body">
                    <h1>
                    Beginner Track
                    </h1>
                    <p> Learn the basics of Web3, wallets, and crypto trading through simple, practical lessons designed for first-time users.</p>
                </div>
                <div class="hero-image">
                    <img src="./images/Beginner_Track_Hero_img.svg" alt="Hero Image">
                </div>
            </div>
        </div>
    </header>

    <div class="courses-section">
        <div class="section-container">
            <div class="controls">
                <div class="count">Loading…</div>
                <div class="filter">
                    <div class="search">
                        <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" placeholder="Search for anything">
                    </div>
                    <div class="dropdown-section">All courses
                        <span class="dropdown-btn">
                        <i class="fa-solid fa-angle-down"></i>
                    </span>
                    </div>
                </div>
            </div>

            <div class="courses" id="courses-grid">
                <!-- Populated dynamically by beginner.js -->
            </div>


        </div>
    </div>

    <div data-component="footer" data-props='{"basePath":"./"}'></div>

    <script src="./lib/utils.js"></script>
    <script src="./lib/data-service.js"></script>
    <script src="./lib/auth.js"></script>
    <script src="./lib/component-loader.js"></script>
    <script src="./scripts/index.js"></script>
    <script src="./scripts/learning_track.js"></script>
    <script src="./scripts/beginner.js"></script>
</body>
</html>
