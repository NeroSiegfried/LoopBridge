<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — LoopBridge</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet"/>
    <script src="https://kit.fontawesome.com/20310b9de2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./styles/dashboard.css">
</head>
<body>
    <div data-component="navbar" data-props='{"basePath":"../","activePage":""}'></div>

    <div class="dashboard-page">
        <div class="dashboard-body">
            <div class="dashboard-welcome">
                <h1 id="welcome-title">Dashboard</h1>
                <p id="welcome-sub">Manage your articles and courses</p>
            </div>

            <!-- Stats -->
            <div class="stats-strip" id="stats-strip"></div>

            <!-- Actions -->
            <div class="dashboard-actions">
                <button class="btn btn-ghost" id="reset-data-btn">
                    <i class="fa-solid fa-rotate-left"></i> Reset Data
                </button>
            </div>

            <!-- Tabs -->
            <div class="dashboard-tabs">
                <button class="dashboard-tab active" data-tab="articles">Articles</button>
                <button class="dashboard-tab" data-tab="courses">Courses</button>
            </div>

            <!-- Articles Table -->
            <div id="articles-panel">
                <table class="dashboard-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Author</th>
                            <th style="text-align:right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="articles-tbody"></tbody>
                </table>
            </div>

            <!-- Courses Table (hidden by default) -->
            <div id="courses-panel" style="display:none">
                <table class="dashboard-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Track</th>
                            <th>Duration</th>
                            <th style="text-align:right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="courses-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div data-component="footer" data-props='{"basePath":"../"}'></div>

    <!-- Core Libraries -->
    <script src="../lib/utils.js"></script>
    <script src="../lib/data-service.js"></script>
    <script src="../lib/auth.js"></script>
    <script src="../lib/component-loader.js"></script>

    <script src="./scripts/dashboard.js"></script>
</body>
</html>
