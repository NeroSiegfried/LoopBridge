<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Article — LoopBridge</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet"/>
    <script src="https://kit.fontawesome.com/20310b9de2.js" crossorigin="anonymous"></script>
    <style>
        /* ─── Editor Action Bar ─── */
        .editor-action-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: white;
            border-bottom: 1px solid var(--gray-mid);
            padding: 0.5rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10rem;
        }
        .editor-action-bar .bar-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .editor-action-bar .bar-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* ─── Layout: Editor + Preview side-by-side ─── */
        .editor-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 52px);
        }

        /* ─── Editor Panel (left) ─── */
        .editor-panel {
            padding: 2rem 2.5rem 4rem;
            overflow-y: auto;
            max-height: calc(100vh - 52px);
            border-right: 1px solid var(--gray-mid);
        }
        .editor-panel h1 {
            font-family: var(--font-heading-variable);
            font-size: 1.375rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--lb-blue-text);
        }
        .editor-form .form-group {
            margin-bottom: 1.25rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }
        .form-label {
            display: block;
            font-family: var(--font-body);
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--black-dark);
            margin-bottom: 0.375rem;
        }

        /* ─── Content Blocks ─── */
        .content-blocks {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-height: 120px;
        }
        .content-block {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            padding: 0.75rem;
            background: var(--gray-light);
            border: 1px solid var(--gray-mid);
            border-radius: 0.5rem;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }
        .content-block:focus-within {
            border-color: var(--lb-green);
            box-shadow: 0 0 0 2px rgba(48, 192, 112, 0.08);
        }
        .content-block .block-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }
        .content-block .block-label {
            font-size: 0.6875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--black-mid);
        }
        .block-handle {
            cursor: grab;
            color: var(--black-mid);
            font-size: 0.875rem;
            padding: 0.25rem;
            opacity: 0.4;
            transition: opacity var(--transition-fast);
        }
        .content-block:hover .block-handle { opacity: 1; }
        .block-actions {
            display: flex;
            flex-direction: column;
            gap: 0.125rem;
        }
        .block-actions button {
            background: none;
            border: none;
            color: var(--black-mid);
            font-size: 0.8125rem;
            padding: 0.2rem;
            cursor: pointer;
            border-radius: 4px;
            transition: color var(--transition-fast), background-color var(--transition-fast);
        }
        .block-actions button:hover {
            color: #e53e3e;
            background-color: #fef2f2;
        }

        /* Block inline editor textareas/inputs */
        .content-block .input {
            font-size: 0.875rem;
        }
        .content-block textarea.input {
            min-height: 60px;
            resize: vertical;
        }

        /* File upload area */
        .file-upload-area {
            border: 1px dashed var(--gray-dark);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            background: var(--gray-light);
            transition: border-color var(--transition-fast), background-color var(--transition-fast);
        }
        .file-upload-area:hover {
            border-color: var(--lb-green);
            background-color: #f0fdf5;
        }
        .file-upload-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.875rem;
            color: var(--black-mid);
        }
        .file-upload-label i {
            color: var(--lb-green);
        }
        .file-upload-preview {
            margin-top: 0.5rem;
            border-radius: 0.375rem;
            overflow: hidden;
            max-height: 180px;
        }
        .file-upload-preview img,
        .file-upload-preview video,
        .file-upload-preview audio {
            max-width: 100%;
            border-radius: 0.375rem;
        }
        .block-file-upload {
            margin-top: 0.375rem;
            border: 1px dashed var(--gray-dark);
            border-radius: 0.375rem;
            padding: 0.5rem 0.75rem;
            background: var(--gray-light);
        }
        .block-file-upload label {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            cursor: pointer;
            font-size: 0.8125rem;
            color: var(--black-mid);
        }
        .block-file-upload label i {
            color: var(--lb-green);
        }
        .block-file-upload input[type=\"file\"] {
            display: none;
        }
        .block-file-name {
            font-size: 0.75rem;
            color: var(--black-mid);
            margin-top: 0.25rem;
            font-style: italic;
        }

        /* Add block bar */
        .add-block-bar {
            display: flex;
            gap: 0.375rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px dashed var(--gray-dark);
        }
        .add-block-bar button {
            font-size: 0.8125rem;
            padding: 0.375rem 0.75rem;
        }

        /* Editor actions bar */
        .editor-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-mid);
        }

        /* ─── Preview Panel (right) ─── */
        .preview-panel {
            background-color: white;
            overflow-y: auto;
            max-height: calc(100vh - 52px);
        }
        .preview-header {
            padding: 0.75rem 1.5rem;
            background: var(--gray-light);
            border-bottom: 1px solid var(--gray-mid);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .preview-header span {
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--black-mid);
        }
        .preview-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--lb-green);
            display: inline-block;
            margin-right: 0.375rem;
        }

        /* Preview mimics the public article page */
        .preview-content {
            padding: 2rem 2.5rem 4rem;
            max-width: 820px;
            margin: 0 auto;
        }
        .preview-title {
            font-family: var(--font-heading);
            font-size: clamp(1.5rem, 3vw, 2rem);
            color: var(--lb-blue-text);
            margin-bottom: 0.75rem;
            line-height: 1.2;
            min-height: 1.5em;
        }
        .preview-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .preview-meta .meta-pill {
            font-size: 0.8125rem;
        }
        .preview-cover {
            width: 100%;
            aspect-ratio: 3.1/1;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            background-color: var(--gray-light);
            border: 1px solid var(--gray-mid);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--black-mid);
            font-size: 0.875rem;
        }
        .preview-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-body {
            font-family: var(--font-body);
            font-weight: 300;
            color: var(--black-two);
            font-size: 1.0625rem;
            line-height: 1.9rem;
        }
        .preview-body h2 {
            font-family: var(--font-heading-variable);
            font-size: 1.375rem;
            font-weight: 600;
            color: var(--lb-blue-text);
            margin: 2rem 0 0.75rem;
        }
        .preview-body h3 {
            font-family: var(--font-heading-variable);
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--lb-blue-text);
            margin: 1.25rem 0 0.5rem;
        }
        .preview-body p {
            margin: 0.75rem 0;
        }
        .preview-body ul, .preview-body ol {
            margin: 0.75rem 0;
            padding-left: 1.5rem;
        }
        .preview-body li {
            margin: 0.375rem 0;
            line-height: 1.7;
        }
        .preview-body blockquote {
            margin: 1.25rem 0;
            padding: 0.75rem 1.25rem;
            border-left: 4px solid var(--lb-green);
            background-color: var(--gray-light);
            font-style: italic;
            color: var(--black-mid);
            border-radius: 0 0.5rem 0.5rem 0;
        }
        .preview-body img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1rem 0;
        }
        .preview-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--black-mid);
            font-size: 0.9375rem;
        }
        .preview-empty i {
            display: block;
            font-size: 2rem;
            margin-bottom: 0.75rem;
            opacity: 0.4;
        }

        /* ─── Responsive ─── */
        @media (max-width: 62rem) {
            .editor-layout {
                grid-template-columns: 1fr;
            }
            .editor-panel {
                max-height: none;
                border-right: none;
                border-bottom: 1px solid var(--gray-mid);
            }
            .preview-panel {
                max-height: none;
            }
            .editor-action-bar { padding: 0.5rem 1.25rem; }
            .editor-panel { padding: 1.5rem 1.25rem 3rem; }
            .preview-content { padding: 1.5rem 1.25rem 3rem; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div data-component="navbar" data-props='{"basePath":"../","activePage":""}'></div>

    <div class="editor-action-bar">
        <div class="bar-left">
            <a href="dashboard.html" class="btn btn-sm btn-ghost">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
        </div>
        <div class="bar-right">
            <button type="button" class="btn btn-sm btn-primary" id="save-header-btn">
                <i class="fa-solid fa-floppy-disk"></i> Save
            </button>
        </div>
    </div>

    <div class="editor-layout">
        <!-- ─── Editor Panel ─── -->
        <div class="editor-panel">
            <h1 id="editor-title">New Article</h1>

            <form class="editor-form" id="article-form">
                <div class="form-group">
                    <label class="form-label" for="title">Title *</label>
                    <input class="input" type="text" id="title" name="title" placeholder="Enter article title" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="category">Categories * <span style="font-weight:300;font-size:0.75rem;color:var(--black-mid)">(comma-separated)</span></label>
                        <input class="input" type="text" id="category" name="category" placeholder="DeFi, Bitcoin, Security" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="author-name">Author</label>
                        <input class="input" type="text" id="author-name" name="author-name" placeholder="Author name">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="excerpt">Excerpt / Description</label>
                    <textarea class="input textarea" id="excerpt" name="excerpt" rows="2" placeholder="Brief summary of the article"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="cover-upload">Cover Image</label>
                    <div class="file-upload-area">
                        <label class="file-upload-label">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <span id="cover-filename">Choose an image file…</span>
                            <input type="file" id="cover-upload" accept="image/*" style="display:none">
                        </label>
                    </div>
                </div>

                <div class="form-group" id="featured-group" style="display:flex;align-items:center;gap:0.5rem;">
                    <input type="checkbox" id="featured" name="featured">
                    <label class="form-label" for="featured" style="margin:0">Featured article</label>
                </div>

                <!-- Content Blocks -->
                <div class="form-group">
                    <label class="form-label">Content Blocks</label>
                    <div class="content-blocks" id="content-blocks"></div>
                    <div class="add-block-bar">
                        <button type="button" class="btn btn-sm btn-ghost" data-add="heading">
                            <i class="fa-solid fa-heading"></i> Heading
                        </button>
                        <button type="button" class="btn btn-sm btn-ghost" data-add="paragraph">
                            <i class="fa-solid fa-paragraph"></i> Paragraph
                        </button>
                        <button type="button" class="btn btn-sm btn-ghost" data-add="list">
                            <i class="fa-solid fa-list"></i> List
                        </button>
                        <button type="button" class="btn btn-sm btn-ghost" data-add="blockquote">
                            <i class="fa-solid fa-quote-left"></i> Quote
                        </button>
                        <button type="button" class="btn btn-sm btn-ghost" data-add="image">
                            <i class="fa-solid fa-image"></i> Image
                        </button>
                        <button type="button" class="btn btn-sm btn-ghost" data-add="video">
                            <i class="fa-solid fa-film"></i> Video
                        </button>
                        <button type="button" class="btn btn-sm btn-ghost" data-add="audio">
                            <i class="fa-solid fa-headphones"></i> Audio
                        </button>
                        <button type="button" class="btn btn-sm btn-ghost" data-add="embed">
                            <i class="fa-solid fa-code"></i> Embed
                        </button>
                    </div>
                </div>

                <!-- Actions -->
                <div class="editor-actions">
                    <button type="submit" class="btn btn-primary" id="save-btn">
                        <i class="fa-solid fa-floppy-disk"></i> Save Article
                    </button>
                    <a href="dashboard.html" class="btn btn-ghost">Cancel</a>
                </div>
            </form>
        </div>

        <!-- ─── Preview Panel ─── -->
        <div class="preview-panel">
            <div class="preview-header">
                <span><span class="preview-dot"></span>Live Preview</span>
            </div>
            <div class="preview-content">
                <h1 class="preview-title" id="preview-title">Article Title</h1>
                <div class="preview-meta" id="preview-meta">
                    <span class="meta-pill" id="preview-category">Category</span>
                    <span class="meta-pill" id="preview-date">Today</span>
                    <span class="meta-pill" id="preview-readtime">1 min read</span>
                </div>
                <div class="preview-cover" id="preview-cover">
                    <span>Cover image preview</span>
                </div>
                <div class="preview-body" id="preview-body">
                    <div class="preview-empty">
                        <i class="fa-solid fa-pen-nib"></i>
                        Start writing — your article appears here in real time.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Core Libraries -->
    <script src="../lib/utils.js"></script>
    <script src="../lib/data-service.js"></script>
    <script src="../lib/auth.js"></script>
    <script src="../lib/component-loader.js"></script>

    <script>
        document.addEventListener('components-loaded', async () => {
            'use strict';

            // ─── Auth check ──────────────────────────────
            const user = Auth.getCurrentUser();
            if (!user || (user.role !== 'admin' && user.role !== 'author')) {
                window.location.href = '../pages/login.html';
                return;
            }

            const isAdmin = user.role === 'admin';

            // Only admins can set an article as featured
            if (!isAdmin) {
                document.getElementById('featured-group').style.display = 'none';
            }

            const articleId = Utils.getParam('id');
            const isEditing = !!articleId;
            let existingArticle = null;

            // Track uploaded files via object URLs
            let coverObjectUrl = '';
            const blockFileUrls = {}; // blockId -> objectUrl

            if (isEditing) {
                existingArticle = await DataService.getArticle(articleId);
                if (!existingArticle) {
                    Utils.showToast('Article not found.', 'error');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                    return;
                }

                document.getElementById('editor-title').textContent = 'Edit Article';
                document.title = 'Edit: ' + existingArticle.title + ' — LoopBridge';

                // Populate form fields
                document.getElementById('title').value = existingArticle.title || '';
                document.getElementById('category').value = existingArticle.category || '';

                const authorVal = existingArticle.author;
                document.getElementById('author-name').value =
                    typeof authorVal === 'string' ? authorVal : (authorVal && authorVal.name ? authorVal.name : '');

                document.getElementById('excerpt').value = existingArticle.excerpt || existingArticle.description || '';

                // Cover image: show existing
                if (existingArticle.image) {
                    coverObjectUrl = existingArticle.image;
                    document.getElementById('cover-filename').textContent = existingArticle.image.split('/').pop() || 'Existing image';
                }

                document.getElementById('featured').checked = !!existingArticle.featured;

                // Populate content blocks
                if (existingArticle.content && Array.isArray(existingArticle.content)) {
                    existingArticle.content.forEach(block => addBlock(block));
                }
            } else {
                document.getElementById('author-name').value = user.displayName || '';
            }

            // ─── Cover image upload ──────────────────────
            const coverInput = document.getElementById('cover-upload');
            const coverFilename = document.getElementById('cover-filename');
            coverInput.addEventListener('change', () => {
                if (coverInput.files.length > 0) {
                    const file = coverInput.files[0];
                    coverFilename.textContent = file.name;
                    // Revoke old URL
                    if (coverObjectUrl && coverObjectUrl.startsWith('blob:')) {
                        URL.revokeObjectURL(coverObjectUrl);
                    }
                    coverObjectUrl = URL.createObjectURL(file);
                    // Save filename for persistence
                    coverInput.dataset.savedFilename = `./images/uploads/${file.name}`;
                    updatePreview();
                }
            });

            // ─── Content blocks management ───────────────
            const blocksContainer = document.getElementById('content-blocks');
            let blockIdCounter = 0;

            function addBlock(data = null) {
                const type = data ? data.type : 'paragraph';
                const id = 'block-' + (blockIdCounter++);

                const blockEl = document.createElement('div');
                blockEl.className = 'content-block';
                blockEl.dataset.blockId = id;
                blockEl.dataset.blockType = type;

                let fieldHTML = '';
                if (type === 'heading') {
                    fieldHTML = `
                        <select class="input" data-field="level" style="width:auto;margin-bottom:0.375rem;">
                            <option value="2" ${data && data.level === 2 ? 'selected' : ''}>H2</option>
                            <option value="3" ${data && data.level === 3 ? 'selected' : ''}>H3</option>
                        </select>
                        <input class="input" type="text" data-field="text" placeholder="Heading text" value="${data ? Utils.escapeHTML(data.text || '') : ''}">
                    `;
                } else if (type === 'paragraph') {
                    fieldHTML = `
                        <textarea class="input textarea" data-field="text" rows="3" placeholder="Write your paragraph…">${data ? Utils.escapeHTML(data.text || '') : ''}</textarea>
                    `;
                } else if (type === 'list') {
                    const items = data && data.items ? data.items.join('\n') : '';
                    fieldHTML = `
                        <label style="font-size:0.75rem;color:var(--black-mid);display:flex;align-items:center;gap:0.375rem;">
                            <input type="checkbox" data-field="ordered" ${data && data.ordered ? 'checked' : ''}> Ordered list
                        </label>
                        <textarea class="input textarea" data-field="items" rows="3" placeholder="One item per line">${Utils.escapeHTML(items)}</textarea>
                    `;
                } else if (type === 'blockquote') {
                    fieldHTML = `
                        <textarea class="input textarea" data-field="text" rows="2" placeholder="Quote text…">${data ? Utils.escapeHTML(data.text || '') : ''}</textarea>
                    `;
                } else if (type === 'image') {
                    const fileId = 'file-' + id;
                    fieldHTML = `
                        <div class="block-file-upload">
                            <label>
                                <i class="fa-solid fa-cloud-arrow-up"></i>
                                <span class="block-file-name-label" id="fname-${id}">${data && data.src ? data.src.split('/').pop() : 'Choose image\u2026'}</span>
                                <input type="file" accept="image/*" data-field="file" id="${fileId}">
                            </label>
                        </div>
                        <input class="input" type="text" data-field="alt" placeholder="Alt text (optional)" value="${data ? Utils.escapeHTML(data.alt || '') : ''}" style="margin-top:0.25rem;">
                    `;
                } else if (type === 'video') {
                    const fileId = 'file-' + id;
                    fieldHTML = `
                        <div class="block-file-upload">
                            <label>
                                <i class="fa-solid fa-cloud-arrow-up"></i>
                                <span class="block-file-name-label" id="fname-${id}">${data && data.src ? data.src.split('/').pop() : 'Choose video\u2026'}</span>
                                <input type="file" accept="video/mp4,video/webm,video/ogg" data-field="file" id="${fileId}">
                            </label>
                        </div>
                        <input class="input" type="text" data-field="caption" placeholder="Caption (optional)" value="${data ? Utils.escapeHTML(data.caption || '') : ''}" style="margin-top:0.25rem;">
                    `;
                } else if (type === 'audio') {
                    const fileId = 'file-' + id;
                    fieldHTML = `
                        <div class="block-file-upload">
                            <label>
                                <i class="fa-solid fa-cloud-arrow-up"></i>
                                <span class="block-file-name-label" id="fname-${id}">${data && data.src ? data.src.split('/').pop() : 'Choose audio\u2026'}</span>
                                <input type="file" accept="audio/mpeg,audio/ogg,audio/wav" data-field="file" id="${fileId}">
                            </label>
                        </div>
                        <input class="input" type="text" data-field="caption" placeholder="Caption (optional)" value="${data ? Utils.escapeHTML(data.caption || '') : ''}" style="margin-top:0.25rem;">
                    `;
                } else if (type === 'embed') {
                    fieldHTML = `
                        <input class="input" type="text" data-field="src" placeholder="Embed URL (YouTube, Twitter, etc.)" value="${data ? Utils.escapeHTML(data.src || '') : ''}">
                        <input class="input" type="text" data-field="caption" placeholder="Caption (optional)" value="${data ? Utils.escapeHTML(data.caption || '') : ''}" style="margin-top:0.25rem;">
                    `;
                }

                blockEl.innerHTML = `
                    <span class="block-handle" title="Drag to reorder">
                        <i class="fa-solid fa-grip-vertical"></i>
                    </span>
                    <div class="block-body">
                        <span class="block-label">${type}</span>
                        ${fieldHTML}
                    </div>
                    <div class="block-actions">
                        <button type="button" title="Move up" data-move-up="${id}">
                            <i class="fa-solid fa-chevron-up"></i>
                        </button>
                        <button type="button" title="Move down" data-move-down="${id}">
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        <button type="button" title="Remove" data-remove="${id}">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                `;

                blocksContainer.appendChild(blockEl);

                // Event handlers
                blockEl.querySelector(`[data-remove="${id}"]`).addEventListener('click', () => {
                    blockEl.remove();
                    updatePreview();
                });

                blockEl.querySelector(`[data-move-up="${id}"]`).addEventListener('click', () => {
                    const prev = blockEl.previousElementSibling;
                    if (prev) {
                        blocksContainer.insertBefore(blockEl, prev);
                        updatePreview();
                    }
                });

                blockEl.querySelector(`[data-move-down="${id}"]`).addEventListener('click', () => {
                    const next = blockEl.nextElementSibling;
                    if (next) {
                        blocksContainer.insertBefore(next, blockEl);
                        updatePreview();
                    }
                });

                // Live update preview on input
                blockEl.querySelectorAll('input, textarea, select').forEach(el => {
                    el.addEventListener('input', updatePreview);
                    el.addEventListener('change', updatePreview);
                });

                // File upload handler for media blocks
                const fileInput = blockEl.querySelector('[data-field="file"]');
                if (fileInput) {
                    fileInput.addEventListener('change', () => {
                        if (fileInput.files.length > 0) {
                            const file = fileInput.files[0];
                            const labelEl = document.getElementById('fname-' + id);
                            if (labelEl) labelEl.textContent = file.name;
                            // Revoke old object URL
                            if (blockFileUrls[id] && blockFileUrls[id].startsWith('blob:')) {
                                URL.revokeObjectURL(blockFileUrls[id]);
                            }
                            blockFileUrls[id] = URL.createObjectURL(file);
                            // Store the target path for saving
                            fileInput.dataset.savedFilename = `./images/uploads/${file.name}`;
                            updatePreview();
                        }
                    });
                    // Restore existing data src as an initial URL
                    if (data && data.src) {
                        blockFileUrls[id] = data.src;
                    }
                }

                updatePreview();
            }

            // Add block buttons
            document.querySelectorAll('[data-add]').forEach(btn => {
                btn.addEventListener('click', () => {
                    addBlock({ type: btn.dataset.add });
                    // Scroll to new block
                    blocksContainer.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'center' });
                });
            });

            // ─── Build content array from blocks ─────────
            function getContentBlocks() {
                const blocks = [];
                blocksContainer.querySelectorAll('.content-block').forEach(blockEl => {
                    const type = blockEl.dataset.blockType;
                    const block = { type };

                    if (type === 'heading') {
                        block.text = blockEl.querySelector('[data-field="text"]').value;
                        block.level = parseInt(blockEl.querySelector('[data-field="level"]').value);
                    } else if (type === 'paragraph' || type === 'blockquote') {
                        block.text = blockEl.querySelector('[data-field="text"]').value;
                    } else if (type === 'list') {
                        block.items = blockEl.querySelector('[data-field="items"]').value
                            .split('\n').map(s => s.trim()).filter(Boolean);
                        block.ordered = blockEl.querySelector('[data-field="ordered"]').checked;
                    } else if (type === 'image') {
                        const fileInput = blockEl.querySelector('[data-field="file"]');
                        block.src = fileInput && fileInput.dataset.savedFilename
                            ? fileInput.dataset.savedFilename
                            : (blockFileUrls[blockEl.dataset.blockId] || '');
                        block.alt = blockEl.querySelector('[data-field="alt"]').value;
                    } else if (type === 'video') {
                        const fileInput = blockEl.querySelector('[data-field="file"]');
                        block.src = fileInput && fileInput.dataset.savedFilename
                            ? fileInput.dataset.savedFilename
                            : (blockFileUrls[blockEl.dataset.blockId] || '');
                        block.caption = blockEl.querySelector('[data-field="caption"]')?.value || '';
                    } else if (type === 'audio') {
                        const fileInput = blockEl.querySelector('[data-field="file"]');
                        block.src = fileInput && fileInput.dataset.savedFilename
                            ? fileInput.dataset.savedFilename
                            : (blockFileUrls[blockEl.dataset.blockId] || '');
                        block.caption = blockEl.querySelector('[data-field="caption"]')?.value || '';
                    } else if (type === 'embed') {
                        block.src = blockEl.querySelector('[data-field="src"]').value;
                        block.caption = blockEl.querySelector('[data-field="caption"]')?.value || '';
                    }

                    blocks.push(block);
                });
                return blocks;
            }

            // ─── Live Preview ────────────────────────────
            const debouncedPreview = Utils.debounce(updatePreview, 150);
            ['title', 'category', 'author-name', 'excerpt', 'cover-url'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', debouncedPreview);
                    el.addEventListener('change', debouncedPreview);
                }
            });

            function updatePreview() {
                // Title
                const title = document.getElementById('title').value.trim();
                document.getElementById('preview-title').textContent = title || 'Article Title';

                // Meta
                const cat = document.getElementById('category').value || 'Category';
                document.getElementById('preview-category').textContent = cat;
                document.getElementById('preview-date').textContent = Utils.formatDate(new Date().toISOString());

                // Read time
                const blocks = getContentBlocks();
                document.getElementById('preview-readtime').textContent = Utils.readingTime(blocks);

                // Cover image
                const coverEl = document.getElementById('preview-cover');
                if (coverObjectUrl) {
                    const previewSrc = coverObjectUrl.startsWith('blob:')
                        ? coverObjectUrl
                        : '../' + coverObjectUrl.replace(/^\.\//, '');
                    coverEl.innerHTML = `<img src="${previewSrc}" alt="${Utils.escapeHTML(title)}" onerror="this.parentElement.innerHTML='<span>Image not found</span>'">`;
                } else {
                    coverEl.innerHTML = '<span>Cover image preview</span>';
                }

                // Body
                const bodyEl = document.getElementById('preview-body');
                if (blocks.length === 0) {
                    bodyEl.innerHTML = `
                        <div class="preview-empty">
                            <i class="fa-solid fa-pen-nib"></i>
                            Start writing — your article appears here in real time.
                        </div>
                    `;
                    return;
                }

                bodyEl.innerHTML = blocks.map((block, idx) => {
                    // Get the corresponding block element to retrieve blockId for file URLs
                    const blockEls = blocksContainer.querySelectorAll('.content-block');
                    const blockEl = blockEls[idx];
                    const blockId = blockEl ? blockEl.dataset.blockId : '';

                    switch (block.type) {
                        case 'heading': {
                            const tag = block.level === 3 ? 'h3' : 'h2';
                            return block.text ? `<${tag}>${Utils.escapeHTML(block.text)}</${tag}>` : '';
                        }
                        case 'paragraph':
                            return block.text ? `<p>${Utils.escapeHTML(block.text)}</p>` : '';
                        case 'list': {
                            if (!block.items || block.items.length === 0) return '';
                            const items = block.items.map(i => `<li>${Utils.escapeHTML(i)}</li>`).join('');
                            return block.ordered ? `<ol>${items}</ol>` : `<ul>${items}</ul>`;
                        }
                        case 'blockquote':
                            return block.text ? `<blockquote>${Utils.escapeHTML(block.text)}</blockquote>` : '';
                        case 'image': {
                            const mediaSrc = blockFileUrls[blockId] || block.src;
                            if (!mediaSrc) return '';
                            const imgSrc = mediaSrc.startsWith('blob:') ? mediaSrc
                                : '../' + mediaSrc.replace(/^\.\//, '');
                            return `<img src="${imgSrc}" alt="${Utils.escapeHTML(block.alt || '')}" onerror="this.style.display='none'">`;
                        }
                        case 'video': {
                            const mediaSrc = blockFileUrls[blockId] || block.src;
                            if (!mediaSrc) return '';
                            const vidSrc = mediaSrc.startsWith('blob:') ? mediaSrc
                                : '../' + mediaSrc.replace(/^\.\//, '');
                            return `<video controls style="max-width:100%;border-radius:8px;margin:1rem 0;"><source src="${vidSrc}"></video>`
                                + (block.caption ? `<p style="font-size:0.875rem;color:var(--black-mid);text-align:center;margin-top:0.25rem;"><em>${Utils.escapeHTML(block.caption)}</em></p>` : '');
                        }
                        case 'audio': {
                            const mediaSrc = blockFileUrls[blockId] || block.src;
                            if (!mediaSrc) return '';
                            const audSrc = mediaSrc.startsWith('blob:') ? mediaSrc
                                : '../' + mediaSrc.replace(/^\.\//, '');
                            return `<audio controls style="width:100%;margin:1rem 0;"><source src="${audSrc}"></audio>`
                                + (block.caption ? `<p style="font-size:0.875rem;color:var(--black-mid);text-align:center;margin-top:0.25rem;"><em>${Utils.escapeHTML(block.caption)}</em></p>` : '');
                        }
                        case 'embed': {
                            if (!block.src) return '';
                            // Convert YouTube watch URLs to embed
                            let embedSrc = block.src;
                            const ytMatch = embedSrc.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/);
                            if (ytMatch) embedSrc = `https://www.youtube.com/embed/${ytMatch[1]}`;
                            return `<iframe src="${Utils.escapeHTML(embedSrc)}" style="width:100%;aspect-ratio:16/9;border:none;border-radius:8px;margin:1rem 0;" allowfullscreen></iframe>`
                                + (block.caption ? `<p style="font-size:0.875rem;color:var(--black-mid);text-align:center;margin-top:0.25rem;"><em>${Utils.escapeHTML(block.caption)}</em></p>` : '');
                        }
                        default:
                            return '';
                    }
                }).filter(Boolean).join('\n');
            }

            // Initial preview render
            updatePreview();

            // ─── Save ────────────────────────────────────
            async function saveArticle() {
                const saveBtn = document.getElementById('save-btn');
                const saveHeaderBtn = document.getElementById('save-header-btn');
                saveBtn.textContent = 'Saving…';
                saveBtn.disabled = true;
                saveHeaderBtn.disabled = true;

                const authorInput = document.getElementById('author-name').value.trim() || user.displayName;
                const catRaw = document.getElementById('category').value.trim();
                // Take the first category as primary for the category field
                const categories = catRaw.split(',').map(c => c.trim()).filter(Boolean);
                const primaryCategory = categories[0] || '';

                // Determine cover image path
                const coverUpload = document.getElementById('cover-upload');
                let coverImagePath = './images/article-pic.jpg';
                if (coverUpload && coverUpload.dataset.savedFilename) {
                    coverImagePath = coverUpload.dataset.savedFilename;
                } else if (coverObjectUrl && !coverObjectUrl.startsWith('blob:')) {
                    coverImagePath = coverObjectUrl;
                }

                const articleData = {
                    title: document.getElementById('title').value.trim(),
                    category: primaryCategory,
                    categories: categories,
                    author: {
                        name: authorInput,
                        avatar: './images/user-placeholder.svg'
                    },
                    description: document.getElementById('excerpt').value.trim(),
                    excerpt: document.getElementById('excerpt').value.trim(),
                    image: coverImagePath,
                    featured: isAdmin ? document.getElementById('featured').checked : false,
                    content: getContentBlocks(),
                    ownerId: user.id || user.username
                };

                try {
                    if (isEditing) {
                        await DataService.updateArticle(articleId, articleData);
                        Utils.showToast('Article updated!', 'success');
                    } else {
                        articleData.publishedAt = new Date().toISOString();
                        articleData.readTime = Utils.readingTime(articleData.content);
                        const newArticle = await DataService.createArticle(articleData);
                        Utils.showToast('Article created!', 'success');
                        setTimeout(() => {
                            window.location.href = 'edit-article.html?id=' + newArticle.id;
                        }, 800);
                        return;
                    }
                } catch (err) {
                    Utils.showToast('Failed to save: ' + err.message, 'error');
                }

                saveBtn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Article';
                saveBtn.disabled = false;
                saveHeaderBtn.disabled = false;
            }

            document.getElementById('article-form').addEventListener('submit', (e) => {
                e.preventDefault();
                saveArticle();
            });

            document.getElementById('save-header-btn').addEventListener('click', () => {
                if (document.getElementById('article-form').reportValidity()) {
                    saveArticle();
                }
            });
        });
    </script>
</body>
</html>
