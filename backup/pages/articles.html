<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles — LoopBridge</title>
    <meta name="description" content="Browse crypto articles covering DeFi, trading, market analysis, and Web3.">
    <meta property="og:title" content="Articles — LoopBridge">
    <meta property="og:description" content="Browse crypto articles covering DeFi, trading, market analysis, and Web3.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/images/logos/loopbridge-og.png">
    <meta property="og:site_name" content="LoopBridge">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Articles — LoopBridge">
    <meta name="twitter:description" content="Browse crypto articles covering DeFi, trading, market analysis, and Web3.">
    <meta name="twitter:image" content="/images/logos/loopbridge-og.png">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet"/>
    <script src="https://kit.fontawesome.com/20310b9de2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./styles/articles.css">
</head>
<body>
    <!-- Navbar Component -->
    <div data-component="navbar" data-props='{"basePath":"../","activePage":"blog"}'></div>

    <!-- Hero -->
    <header class="articles-page-hero">
        <div class="section-container">
            <h1>LoopBridge Articles</h1>
            <p>Our articles deliver practical insights on Web3, markets, and new financial trends — without the noise.</p>
        </div>
    </header>

    <!-- Content -->
    <section class="articles-content">
        <div class="section-container">
            <!-- Controls -->
            <div class="articles-controls">
                <div class="articles-filter" id="category-filter">
                    <!-- Category buttons rendered by JS -->
                </div>
                <div class="articles-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="article-search" placeholder="Search articles..." aria-label="Search articles">
                </div>
            </div>

            <!-- Grid -->
            <div class="articles-grid" id="articles-grid">
                <!-- Article cards rendered by JS -->
            </div>

            <!-- Load More -->
            <div class="articles-load-more">
                <button class="btn btn-ghost" id="load-more-btn" style="display:none;">
                    Load More Articles
                </button>
            </div>
        </div>
    </section>

    <!-- Newsletter Component -->
    <div data-component="newsletter" data-props='{"basePath":"../"}'></div>

    <!-- Footer Component -->
    <div data-component="footer" data-props='{"basePath":"../"}'></div>

    <!-- Core Libraries -->
    <script src="../lib/utils.js"></script>
    <script src="../lib/data-service.js"></script>
    <script src="../lib/auth.js"></script>
    <script src="../lib/component-loader.js"></script>

    <!-- Page Script -->
    <script src="./scripts/articles.js"></script>
</body>
</html>
