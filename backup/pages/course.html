<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course — LoopBridge</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet"/>
    <script src="https://kit.fontawesome.com/20310b9de2.js" crossorigin="anonymous"></script>
    <style>
        .course-page-hero {
            padding: 14rem 2.5rem 4rem;
            background-color: var(--lb-blue-dark);
        }

        .course-page-hero .section-container {
            display: flex;
            gap: 3rem;
            max-width: var(--max-width);
            margin: auto;
            align-items: flex-start;
        }

        .course-hero-body {
            flex: 1.5;
        }

        .course-hero-body h1 {
            font-family: var(--font-heading);
            font-size: clamp(2rem, 4vw, 3rem);
            color: white;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .course-hero-body p {
            font-family: var(--font-body);
            font-size: 1.125rem;
            color: var(--gray-mid);
            font-weight: 300;
            line-height: 1.8;
        }

        .course-hero-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .course-hero-meta .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 300;
        }

        .course-hero-meta .meta-item i {
            color: var(--lb-green);
        }

        .course-hero-sidebar {
            flex: 1;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
        }

        .course-hero-sidebar h3 {
            font-family: var(--font-heading-variable);
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--lb-blue-text);
            margin-bottom: 1rem;
        }

        .course-objectives {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .course-objectives li {
            display: flex;
            align-items: flex-start;
            gap: 0.625rem;
            padding: 0.5rem 0;
            font-family: var(--font-body);
            font-size: 0.875rem;
            color: var(--black-mid);
            font-weight: 300;
            line-height: 1.6;
        }

        .course-objectives li i {
            color: var(--lb-green);
            margin-top: 0.25rem;
            flex-shrink: 0;
        }

        /* Topics Section */
        .course-topics {
            padding: 4rem 2.5rem;
        }

        .course-topics .section-container {
            display: block;
            max-width: 820px;
            margin: auto;
        }

        .course-topics h2 {
            font-family: var(--font-heading-variable);
            font-weight: 600;
            font-size: clamp(1.5rem, 3vw, 2rem);
            color: var(--lb-blue-text);
            margin-bottom: 2rem;
            text-align: left;
        }

        /* Topic accordion */
        .topic {
            border: 1px solid var(--gray-mid);
            border-radius: 0.75rem;
            margin-bottom: 0.75rem;
            overflow: hidden;
            transition: border-color 0.2s ease;
        }

        .topic:hover {
            border-color: var(--gray-dark);
        }

        .topic-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            cursor: pointer;
            background: white;
            transition: background-color 0.2s ease;
            user-select: none;
        }

        .topic-header:hover {
            background-color: var(--gray-light);
        }

        .topic-header h3 {
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1rem;
            color: var(--lb-blue-text);
            margin: 0;
        }

        .topic-header .topic-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-family: var(--font-body);
            font-size: 0.8125rem;
            color: var(--black-mid);
            font-weight: 300;
        }

        .topic-header .topic-toggle {
            transition: transform 0.3s ease;
            color: var(--black-mid);
        }

        .topic.active .topic-toggle {
            transform: rotate(180deg);
        }

        .topic-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
            background-color: var(--gray-light);
        }

        .topic.active .topic-body {
            max-height: 50rem;
        }

        .topic-body-inner {
            padding: 0 1.5rem 1.25rem;
        }

        .subsection {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--gray-mid);
            font-family: var(--font-body);
            font-size: 0.875rem;
        }

        .subsection:last-child {
            border-bottom: none;
        }

        .subsection-title {
            color: var(--black-dark);
            font-weight: 400;
        }

        .subsection-duration {
            color: var(--black-mid);
            font-weight: 300;
            font-size: 0.8125rem;
        }

        @media (max-width: 62rem) {
            .course-page-hero {
                padding: 12rem 1.25rem 3rem;
            }

            .course-page-hero .section-container {
                flex-direction: column;
            }

            .course-hero-sidebar {
                width: 100%;
            }

            .course-topics {
                padding: 3rem 1.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div data-component="navbar" data-props='{"basePath":"../","activePage":"academy"}'></div>

    <!-- Hero -->
    <header class="course-page-hero" id="course-hero">
        <div class="section-container">
            <div class="course-hero-body">
                <span class="badge" id="course-badge"></span>
                <h1 id="course-title">Loading...</h1>
                <p id="course-description"></p>
                <div class="course-hero-meta" id="course-meta"></div>
            </div>
            <div class="course-hero-sidebar">
                <h3>What you'll learn</h3>
                <ul class="course-objectives" id="course-objectives"></ul>
            </div>
        </div>
    </header>

    <!-- Topics -->
    <section class="course-topics">
        <div class="section-container">
            <h2>Course Content</h2>
            <div id="topics-container"></div>
        </div>
    </section>

    <!-- Newsletter -->
    <div data-component="newsletter" data-props='{"basePath":"../"}'></div>

    <!-- Footer -->
    <div data-component="footer" data-props='{"basePath":"../"}'></div>

    <!-- Core Libraries -->
    <script src="../lib/utils.js"></script>
    <script src="../lib/data-service.js"></script>
    <script src="../lib/auth.js"></script>
    <script src="../lib/component-loader.js"></script>

    <script>
        document.addEventListener('components-loaded', async () => {
            const courseId = Utils.getParam('id');
            if (!courseId) {
                document.getElementById('course-title').textContent = 'Course Not Found';
                return;
            }

            const course = await DataService.getCourse(courseId);
            if (!course) {
                document.getElementById('course-title').textContent = 'Course Not Found';
                return;
            }

            document.title = course.title + ' — LoopBridge';

            // Badge
            const badgeEl = document.getElementById('course-badge');
            badgeEl.textContent = course.track;
            badgeEl.classList.add('badge-' + course.track);

            // Title & description
            document.getElementById('course-title').textContent = course.title;
            document.getElementById('course-description').textContent = course.description || '';

            // Meta
            const metaEl = document.getElementById('course-meta');
            const topicCount = course.topics ? course.topics.length : 0;
            let lessonCount = 0;
            if (course.topics) {
                course.topics.forEach(t => {
                    lessonCount += t.subsections ? t.subsections.length : 0;
                });
            }
            metaEl.innerHTML = `
                <div class="meta-item"><i class="fa-solid fa-list"></i> ${topicCount} topics</div>
                <div class="meta-item"><i class="fa-solid fa-file-lines"></i> ${lessonCount} lessons</div>
                <div class="meta-item"><i class="fa-regular fa-clock"></i> ${course.duration || ''}</div>
                <div class="meta-item"><i class="fa-solid fa-user"></i> ${course.author || 'LoopBridge Academy'}</div>
            `;

            // Learning objectives
            const objectivesEl = document.getElementById('course-objectives');
            if (course.learningObjectives && course.learningObjectives.length) {
                objectivesEl.innerHTML = course.learningObjectives.map(obj =>
                    `<li><i class="fa-solid fa-check"></i> ${Utils.escapeHTML(obj)}</li>`
                ).join('');
            }

            // Topics accordion
            const topicsContainer = document.getElementById('topics-container');
            if (course.topics && course.topics.length) {
                topicsContainer.innerHTML = course.topics.map((topic, idx) => {
                    const subsections = (topic.subsections || []).map(sub =>
                        `<div class="subsection">
                            <span class="subsection-title">${Utils.escapeHTML(sub.title)}</span>
                            <span class="subsection-duration">${sub.duration || ''}</span>
                        </div>`
                    ).join('');

                    return `
                        <div class="topic${idx === 0 ? ' active' : ''}">
                            <div class="topic-header" role="button" tabindex="0" aria-expanded="${idx === 0 ? 'true' : 'false'}">
                                <h3>${Utils.escapeHTML(topic.title)}</h3>
                                <div class="topic-meta">
                                    <span>${topic.subsections ? topic.subsections.length : 0} lessons</span>
                                    <i class="fa-solid fa-chevron-down topic-toggle"></i>
                                </div>
                            </div>
                            <div class="topic-body">
                                <div class="topic-body-inner">
                                    ${subsections}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Accordion behavior
                topicsContainer.querySelectorAll('.topic-header').forEach(header => {
                    header.addEventListener('click', () => toggleTopic(header));
                    header.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            toggleTopic(header);
                        }
                    });
                });
            }

            function toggleTopic(header) {
                const topic = header.closest('.topic');
                const wasActive = topic.classList.contains('active');

                // Close all
                topicsContainer.querySelectorAll('.topic').forEach(t => {
                    t.classList.remove('active');
                    t.querySelector('.topic-header').setAttribute('aria-expanded', 'false');
                });

                // Open clicked if it wasn't active
                if (!wasActive) {
                    topic.classList.add('active');
                    header.setAttribute('aria-expanded', 'true');
                }
            }
        });
    </script>
</body>
</html>
