<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course — LoopBridge</title>
    <meta name="description" content="Take crypto courses on LoopBridge Academy.">
    <meta property="og:title" content="Course — LoopBridge">
    <meta property="og:description" content="Take crypto courses on LoopBridge Academy.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/images/logos/loopbridge-og.png">
    <meta property="og:site_name" content="LoopBridge">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Course — LoopBridge">
    <meta name="twitter:description" content="Take crypto courses on LoopBridge Academy.">
    <meta name="twitter:image" content="/images/logos/loopbridge-og.png">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet"/>
    <script src="https://kit.fontawesome.com/20310b9de2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./styles/course.css">
</head>
<body>
    <!-- Navbar -->
    <div data-component="navbar" data-props='{"basePath":"../","activePage":"academy"}'></div>

    <!-- Hero -->
    <header class="course-page-hero" id="course-hero">
        <div class="section-container">
            <div class="course-hero-body">
                <span class="badge" id="course-badge"></span>
                <h1 id="course-title">Loading...</h1>
                <p id="course-description"></p>
                <div class="course-hero-meta" id="course-meta"></div>
            </div>
            <div class="course-hero-sidebar">
                <h3>What you'll learn</h3>
                <ul class="course-objectives" id="course-objectives"></ul>
            </div>
        </div>
    </header>

    <!-- Topics -->
    <section class="course-topics">
        <div class="section-container">
            <h2>Course Content</h2>
            <div id="topics-container"></div>
        </div>
    </section>

    <!-- Newsletter -->
    <div data-component="newsletter" data-props='{"basePath":"../"}'></div>

    <!-- Footer -->
    <div data-component="footer" data-props='{"basePath":"../"}'></div>

    <!-- Core Libraries -->
    <script src="../lib/utils.js"></script>
    <script src="../lib/data-service.js"></script>
    <script src="../lib/auth.js"></script>
    <script src="../lib/component-loader.js"></script>

    <script src="./scripts/course.js"></script>
</body>
</html>
