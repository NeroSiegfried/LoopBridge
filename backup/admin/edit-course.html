<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course — LoopBridge Admin</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/20310b9de2.js" crossorigin="anonymous"></script>
    <style>
        .admin-header {
            background-color: var(--lb-blue-dark);
            padding: 1rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .admin-header .logo img {
            height: 24px;
            filter: brightness(0) invert(1);
        }

        .admin-header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .editor-body {
            padding: 2rem 2.5rem 6rem;
            max-width: 820px;
            margin: auto;
        }

        .editor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .editor-header h1 {
            font-family: var(--font-heading-variable);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .editor-form .form-group {
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
        }

        /* Objectives list */
        .objectives-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .objective-row {
            display: flex;
            gap: 0.5rem;
        }

        .objective-row input {
            flex: 1;
        }

        .objective-row button {
            background: none;
            border: none;
            color: var(--black-mid);
            font-size: 0.875rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            transition: color var(--transition-fast);
        }

        .objective-row button:hover {
            color: var(--color-danger, #e53e3e);
        }

        /* Topic editor */
        .topics-editor {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .topic-block {
            background: var(--gray-light);
            border: 1px solid var(--gray-mid);
            border-radius: var(--radius-sm, 0.5rem);
            padding: 1rem;
        }

        .topic-header {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .topic-header input {
            flex: 1;
        }

        .topic-header button {
            background: none;
            border: none;
            color: var(--black-mid);
            font-size: 1rem;
            cursor: pointer;
            padding: 0.25rem;
            transition: color var(--transition-fast);
        }

        .topic-header button:hover {
            color: var(--color-danger, #e53e3e);
        }

        .topic-subsections {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-left: 1rem;
            padding-left: 0.75rem;
            border-left: 2px solid var(--gray-mid);
        }

        .subsection-row {
            display: grid;
            grid-template-columns: 1fr 5rem auto;
            gap: 0.5rem;
            align-items: center;
        }

        .subsection-row input {
            font-size: 0.875rem;
        }

        .subsection-row button {
            background: none;
            border: none;
            color: var(--black-mid);
            font-size: 0.75rem;
            cursor: pointer;
            padding: 0.25rem;
            transition: color var(--transition-fast);
        }

        .subsection-row button:hover {
            color: var(--color-danger, #e53e3e);
        }

        .add-subsection-btn {
            font-size: 0.8125rem !important;
            padding: 0.25rem 0.5rem !important;
            margin-top: 0.25rem;
        }

        .editor-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--gray-mid);
        }

        @media (max-width: 48rem) {
            .editor-body {
                padding: 1.5rem 1.25rem 4rem;
            }
            .form-row, .form-row-3 {
                grid-template-columns: 1fr;
            }
            .admin-header {
                padding: 1rem 1.25rem;
            }
            .subsection-row {
                grid-template-columns: 1fr 4rem auto;
            }
        }
    </style>
</head>
<body>
    <!-- Admin Header -->
    <header class="admin-header">
        <div class="logo">
            <a href="dashboard.html"><img src="../images/logos/LB text no symbol black 2.png" alt="LoopBridge"></a>
        </div>
        <div class="admin-header-right">
            <a href="dashboard.html" class="btn btn-sm btn-ghost" style="color:white;border-color:rgba(255,255,255,0.3);">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
        </div>
    </header>

    <!-- Editor -->
    <div class="editor-body">
        <div class="editor-header">
            <h1 id="editor-title">New Course</h1>
        </div>

        <form class="editor-form" id="course-form">
            <div class="form-group">
                <label class="form-label" for="title">Course Title *</label>
                <input class="input" type="text" id="title" name="title" placeholder="Enter course title" required>
            </div>

            <div class="form-row-3">
                <div class="form-group">
                    <label class="form-label" for="track">Track *</label>
                    <select class="input" id="track" name="track" required>
                        <option value="">Select track</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="duration">Duration</label>
                    <input class="input" type="text" id="duration" name="duration" placeholder="e.g. 4 hours">
                </div>
                <div class="form-group">
                    <label class="form-label" for="author">Instructor</label>
                    <input class="input" type="text" id="author" name="author" placeholder="Instructor name">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea class="input textarea" id="description" name="description" rows="4" placeholder="Course description"></textarea>
            </div>

            <!-- Learning Objectives -->
            <div class="form-group">
                <label class="form-label">Learning Objectives</label>
                <div class="objectives-list" id="objectives-list"></div>
                <button type="button" class="btn btn-sm btn-ghost" id="add-objective" style="margin-top:0.5rem;">
                    <i class="fa-solid fa-plus"></i> Add Objective
                </button>
            </div>

            <!-- Topics -->
            <div class="form-group">
                <label class="form-label">Topics &amp; Subsections</label>
                <div class="topics-editor" id="topics-editor"></div>
                <button type="button" class="btn btn-sm btn-ghost" id="add-topic" style="margin-top:0.75rem;">
                    <i class="fa-solid fa-plus"></i> Add Topic
                </button>
            </div>

            <!-- Actions -->
            <div class="editor-actions">
                <button type="submit" class="btn btn-primary" id="save-btn">
                    <i class="fa-solid fa-floppy-disk"></i> Save Course
                </button>
                <a href="dashboard.html" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>

    <!-- Core Libraries -->
    <script src="../lib/utils.js"></script>
    <script src="../lib/data-service.js"></script>
    <script src="../lib/auth.js"></script>

    <script>
        (async () => {
            // Auth check — admin only for courses
            const user = Auth.getCurrentUser();
            if (!user || user.role !== 'admin') {
                window.location.href = 'login.html';
                return;
            }

            const courseId = Utils.getParam('id');
            const isEditing = !!courseId;
            let existingCourse = null;

            if (isEditing) {
                existingCourse = await DataService.getCourse(courseId);
                if (!existingCourse) {
                    Utils.showToast('Course not found.', 'error');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                    return;
                }

                document.getElementById('editor-title').textContent = 'Edit Course';
                document.title = 'Edit: ' + existingCourse.title + ' — LoopBridge Admin';

                // Populate fields
                document.getElementById('title').value = existingCourse.title || '';
                document.getElementById('track').value = existingCourse.track || '';
                document.getElementById('duration').value = existingCourse.duration || '';
                document.getElementById('author').value = existingCourse.author || '';
                document.getElementById('description').value = existingCourse.description || '';

                // Populate objectives
                if (existingCourse.objectives && Array.isArray(existingCourse.objectives)) {
                    existingCourse.objectives.forEach(obj => addObjective(obj));
                }

                // Populate topics
                if (existingCourse.topics && Array.isArray(existingCourse.topics)) {
                    existingCourse.topics.forEach(topic => addTopic(topic));
                }
            } else {
                document.getElementById('author').value = user.displayName;
            }

            // ──────────────── Objectives ────────────────
            const objectivesList = document.getElementById('objectives-list');

            function addObjective(text = '') {
                const row = document.createElement('div');
                row.className = 'objective-row';
                row.innerHTML = `
                    <input class="input" type="text" placeholder="Objective" value="${Utils.escapeHTML(text)}">
                    <button type="button" title="Remove"><i class="fa-solid fa-xmark"></i></button>
                `;
                objectivesList.appendChild(row);

                row.querySelector('button').addEventListener('click', () => row.remove());
            }

            document.getElementById('add-objective').addEventListener('click', () => addObjective());

            function getObjectives() {
                return Array.from(objectivesList.querySelectorAll('.objective-row input'))
                    .map(input => input.value.trim())
                    .filter(Boolean);
            }

            // ──────────────── Topics ────────────────
            const topicsEditor = document.getElementById('topics-editor');
            let topicIdCounter = 0;

            function addTopic(data = null) {
                const topicId = 'topic-' + (topicIdCounter++);
                const block = document.createElement('div');
                block.className = 'topic-block';
                block.dataset.topicId = topicId;

                block.innerHTML = `
                    <div class="topic-header">
                        <input class="input" type="text" data-field="title" placeholder="Topic title" value="${data ? Utils.escapeHTML(data.title || '') : ''}">
                        <button type="button" title="Remove topic"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <div class="topic-subsections" data-subs="${topicId}"></div>
                    <button type="button" class="btn btn-sm btn-ghost add-subsection-btn" data-add-sub="${topicId}">
                        <i class="fa-solid fa-plus"></i> Subsection
                    </button>
                `;

                topicsEditor.appendChild(block);

                // Remove topic
                block.querySelector('.topic-header button').addEventListener('click', () => block.remove());

                // Add subsection button
                block.querySelector(`[data-add-sub="${topicId}"]`).addEventListener('click', () => {
                    addSubsection(topicId);
                });

                // Populate existing subsections
                if (data && data.subsections && Array.isArray(data.subsections)) {
                    data.subsections.forEach(sub => addSubsection(topicId, sub));
                }
            }

            function addSubsection(topicId, data = null) {
                const container = document.querySelector(`[data-subs="${topicId}"]`);
                const row = document.createElement('div');
                row.className = 'subsection-row';
                row.innerHTML = `
                    <input class="input" type="text" data-field="title" placeholder="Subsection title" value="${data ? Utils.escapeHTML(data.title || '') : ''}">
                    <input class="input" type="text" data-field="duration" placeholder="5 min" value="${data ? Utils.escapeHTML(data.duration || '') : ''}">
                    <button type="button" title="Remove"><i class="fa-solid fa-xmark"></i></button>
                `;
                container.appendChild(row);

                row.querySelector('button').addEventListener('click', () => row.remove());
            }

            document.getElementById('add-topic').addEventListener('click', () => addTopic());

            function getTopics() {
                const topics = [];
                topicsEditor.querySelectorAll('.topic-block').forEach(block => {
                    const titleInput = block.querySelector('[data-field="title"]');
                    const title = titleInput ? titleInput.value.trim() : '';
                    if (!title) return;

                    const subsections = [];
                    block.querySelectorAll('.subsection-row').forEach(subRow => {
                        const subTitle = subRow.querySelector('[data-field="title"]').value.trim();
                        const subDuration = subRow.querySelector('[data-field="duration"]').value.trim();
                        if (subTitle) {
                            subsections.push({ title: subTitle, duration: subDuration || '5 min' });
                        }
                    });

                    topics.push({ title, subsections });
                });
                return topics;
            }

            // ──────────────── Submit ────────────────
            document.getElementById('course-form').addEventListener('submit', async (e) => {
                e.preventDefault();

                const saveBtn = document.getElementById('save-btn');
                saveBtn.textContent = 'Saving...';
                saveBtn.disabled = true;

                const courseData = {
                    title: document.getElementById('title').value.trim(),
                    track: document.getElementById('track').value,
                    duration: document.getElementById('duration').value.trim(),
                    author: document.getElementById('author').value.trim() || user.displayName,
                    description: document.getElementById('description').value.trim(),
                    objectives: getObjectives(),
                    topics: getTopics()
                };

                try {
                    if (isEditing) {
                        await DataService.updateCourse(courseId, courseData);
                        Utils.showToast('Course updated successfully!', 'success');
                    } else {
                        const newCourse = await DataService.createCourse(courseData);
                        Utils.showToast('Course created successfully!', 'success');
                        setTimeout(() => {
                            window.location.href = 'edit-course.html?id=' + newCourse.id;
                        }, 1000);
                        return;
                    }
                } catch (err) {
                    Utils.showToast('Failed to save: ' + err.message, 'error');
                }

                saveBtn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Course';
                saveBtn.disabled = false;
            });
        })();
    </script>
</body>
</html>
