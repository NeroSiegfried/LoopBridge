<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course — LoopBridge</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet"/>
    <script src="https://kit.fontawesome.com/20310b9de2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./styles/edit-course.css">
</head>
<body>
    <div data-component="navbar" data-props='{"basePath":"../","activePage":""}'></div>

    <div class="editor-action-bar">
        <div class="bar-inner">
            <div class="bar-left">
                <a href="dashboard.html" class="btn btn-sm btn-ghost">
                    <i class="fa-solid fa-arrow-left"></i> Dashboard
                </a>
            </div>
            <div class="bar-right">
                <button type="button" class="btn btn-sm btn-primary" id="save-header-btn">
                    <i class="fa-solid fa-floppy-disk"></i> Save
                </button>
            </div>
        </div>
    </div>

    <!-- Editor -->
    <div class="editor-body">
        <div class="editor-header">
            <h1 id="editor-title">New Course</h1>
        </div>

        <!-- Dynamic stats -->
        <div class="course-stats" id="course-stats">
            <div class="course-stat">
                <i class="fa-solid fa-book-open"></i>
                <span class="stat-val" id="stat-topics">0</span> Topics
            </div>
            <div class="course-stat">
                <i class="fa-solid fa-play-circle"></i>
                <span class="stat-val" id="stat-videos">0</span> Videos
            </div>
            <div class="course-stat">
                <i class="fa-solid fa-clipboard-question"></i>
                <span class="stat-val" id="stat-quizzes">0</span> Quizzes
            </div>
            <div class="course-stat">
                <i class="fa-solid fa-list-check"></i>
                <span class="stat-val" id="stat-lessons">0</span> Lessons
            </div>
        </div>

        <form class="editor-form" id="course-form">
            <div class="form-group">
                <label class="form-label" for="title">Course Title *</label>
                <input class="input" type="text" id="title" name="title" placeholder="Enter course title" required>
            </div>

            <div class="form-row-3">
                <div class="form-group">
                    <label class="form-label" for="track">Track *</label>
                    <select class="input" id="track" name="track" required>
                        <option value="">Select track</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="duration">Duration</label>
                    <input class="input" type="text" id="duration" name="duration" placeholder="e.g. 4 hours">
                </div>
                <div class="form-group">
                    <label class="form-label" for="author">Instructor</label>
                    <input class="input" type="text" id="author" name="author" placeholder="Instructor name" readonly style="background:var(--gray-light);cursor:default;">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea class="input textarea" id="description" name="description" rows="3" placeholder="Course description"></textarea>
            </div>

            <!-- Learning Objectives -->
            <div class="form-group">
                <label class="form-label">Learning Objectives</label>
                <div class="objectives-list" id="objectives-list"></div>
                <button type="button" class="btn btn-sm btn-ghost" id="add-objective" style="margin-top:0.5rem;">
                    <i class="fa-solid fa-plus"></i> Add Objective
                </button>
            </div>

            <!-- Topics & Lessons -->
            <div class="form-group">
                <label class="form-label">Topics &amp; Lessons</label>
                <div class="topics-editor" id="topics-editor"></div>
                <button type="button" class="btn btn-sm btn-ghost" id="add-topic" style="margin-top:0.75rem;">
                    <i class="fa-solid fa-plus"></i> Add Topic
                </button>
            </div>

            <!-- Actions -->
            <div class="editor-actions">
                <button type="submit" class="btn btn-primary" id="save-btn">
                    <i class="fa-solid fa-floppy-disk"></i> Save Course
                </button>
                <a href="dashboard.html" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>

    <!-- Core Libraries -->
    <script src="../lib/utils.js"></script>
    <script src="../lib/data-service.js"></script>
    <script src="../lib/auth.js"></script>
    <script src="../lib/component-loader.js"></script>

    <script src="./scripts/edit-course.js"></script>
</body>
</html>
