events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 500m;    # allow large video uploads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting — protect API from abuse
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream app {
        server app:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect (uncomment when SSL is set up) ──────────────
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name _;

        # Health check endpoint (no logging, no rate limit)
        location = /health {
            access_log off;
            proxy_pass http://app;
        }

        # API — rate-limited
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Static assets from React build (served by Express)
        location / {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Cache immutable hashed assets for 1 year
            location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
                proxy_pass http://app;
                proxy_cache_valid 200 365d;
                add_header Cache-Control "public, max-age=31536000, immutable";
            }
        }
    }

    # ── HTTPS (uncomment after `certbot certonly`) ─────────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name loopbridge.network;
    #     ssl_certificate     /etc/letsencrypt/live/loopbridge.network/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/loopbridge.network/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ... (same location blocks as HTTP above)
    # }
}
