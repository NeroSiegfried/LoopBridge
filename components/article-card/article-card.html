<!-- Article Card Template (rendered by JS, not injected as-is) -->
<!-- This file documents the markup structure. Actual rendering is in article-card.js -->
<a href="{{articleUrl}}" class="article-card-link">
    <div class="article-card card">
        <div class="card-image article-card-image">
            <img src="{{thumbnail}}" alt="{{title}}">
            <span class="article-card-category category-pill">{{category}}</span>
        </div>
        <div class="card-body article-card-body">
            <h3 class="article-card-title">{{title}}</h3>
            <p class="article-card-excerpt">{{excerpt}}</p>
            <div class="article-card-meta">
                <span class="article-card-author">{{author}}</span>
                <span class="article-card-read-time">{{readTime}}</span>
            </div>
        </div>
    </div>
</a>
