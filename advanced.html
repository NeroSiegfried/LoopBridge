<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Track — LoopBridge Academy</title>
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/academy.css">
    <link rel="stylesheet" href="./styles/learning_track.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=auto_stories" />
    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet"/>
    <script src="https://kit.fontawesome.com/20310b9de2.js" crossorigin="anonymous"></script>
</head>
<body>
    <div data-component="navbar" data-props='{"basePath":"./","activePage":"academy"}'></div>


    <header class="track-hero">
        <div class="section-container">
            <div class="track-inner-section">
                <div class="hero-body">
                    <h1>
                    Advanced Track
                    </h1>
                    <p>Master advanced Web3 concepts, DeFi strategies, smart contract development, and blockchain architecture for experienced practitioners.</p>
                </div>
                <div class="hero-image">
                    <img src="./images/Intermediate_Track_Hero_img.svg" alt="Hero Image">
                </div>
            </div>
        </div>
    </header>

    <div class="courses-section">
        <div class="section-container">
            <div class="controls">
                <div class="count">50 courses</div>
                <div class="filter">
                    <div class="search">
                        <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" placeholder="Search for anything">
                    </div>
                    <div class="dropdown-section">All courses
                        <span class="dropdown-btn">
                        <i class="fa-solid fa-angle-down"></i>
                    </span>
                    </div>
                </div>
            </div>

            <div class="courses" id="courses-grid">
                <a href="./course_overview.html">
                    <div class="course-container">
                        <div class="course-card">
                            <div class="course-image">
                                <div class="course-price">Free</div>
                                <img src="" alt=""/>
                            </div>
                            <div class="course-body">
                                <div class="main-text">
                                    <h3 class="course-title">Course Title</h3>
                                    <p class="course-description">Build a strong foundation in Web3, crypto, and security.</p>
                                </div>
                                <p class="course-author">By LoopBridge Team</p>
                            </div>
                        </div>
                    </div>
                </a>
            </div>


        </div>
    </div>

    <div data-component="footer" data-props='{"basePath":"./"}'></div>

    <script src="./lib/utils.js"></script>
    <script src="./lib/data-service.js"></script>
    <script src="./lib/auth.js"></script>
    <script src="./lib/component-loader.js"></script>
    <script src="./scripts/index.js"></script>
    <script src="./scripts/learning_track.js"></script>
    <script>
    document.addEventListener('components-loaded', async () => {
        const allCourses = await DataService.getCourses();
        const courses = allCourses.filter(c => c.track === 'advanced');
        const grid = document.getElementById('courses-grid');
        const countEl = document.querySelector('.count');

        const user = (typeof Auth !== 'undefined') ? Auth.getCurrentUser() : null;
        const userId = user ? user.id : null;

        if (countEl) countEl.textContent = courses.length + ' course' + (courses.length !== 1 ? 's' : '');

        function getProgressHTML(course) {
            if (!userId) return '';
            const prog = DataService.getCourseProgress(userId, course.id);
            if (!prog) return '';
            let totalSubs = 0;
            (course.topics || []).forEach(t => { totalSubs += (t.subsections || []).length; });
            if (totalSubs === 0) return '';
            const pct = Math.round((prog.completedSubs.length / totalSubs) * 100);
            return `<div class="course-progress-bar">
                <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
                <span class="progress-label">${pct}%</span>
            </div>`;
        }

        function renderCourses(list) {
            if (!grid) return;
            grid.innerHTML = list.map(c => `
                <a href="./course_overview.html?id=${c.id}">
                    <div class="course-container">
                        <div class="course-card">
                            <div class="course-image">
                                <div class="course-price${c.price ? ' paid' : ''}">${c.price ? '$' + c.price : 'Free'}</div>
                                <img src="${c.image || ''}" alt="${Utils.escapeHTML(c.title)}"/>
                            </div>
                            <div class="course-body">
                                <div class="main-text">
                                    <h3 class="course-title">${Utils.escapeHTML(c.title)}</h3>
                                    <p class="course-description">${Utils.escapeHTML(c.description || '')}</p>
                                </div>
                                ${getProgressHTML(c)}
                                <p class="course-author">By ${c.author ? (typeof c.author === 'string' ? c.author : c.author.name || 'LoopBridge Team') : 'LoopBridge Team'}</p>
                            </div>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        renderCourses(courses);

        // Search
        const searchInput = document.querySelector('.search input');
        if (searchInput) {
            searchInput.addEventListener('input', Utils.debounce(() => {
                const q = searchInput.value.toLowerCase().trim();
                const filtered = q ? courses.filter(c => c.title.toLowerCase().includes(q) || (c.description || '').toLowerCase().includes(q)) : courses;
                renderCourses(filtered);
            }, 250));
        }
    });
    </script>
</body>
</html>
